server:
  port: 8080

spring:
  application:
    name: recycle-backend
  jackson:
    time-zone: Asia/Tokyo
  # DB 接続に失敗すると Flyway が動かずアプリ全体が起動しない（/api も利用不可）。
  # 既定のユーザー recycle / DB recycle はリポジトリ直下の docker compose で作成できる。
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/recycle}
    username: ${DATABASE_USERNAME:recycle}
    password: ${DATABASE_PASSWORD:recycle}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Tokyo
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

# JWT 設定（MVP: HS256）
jwt:
  # ここでは「十分に長い秘密文字列」を raw 文字列として扱います（Base64 ではない前提）。
  secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
  # 有効期限（ミリ秒）。86400000 = 24時間
  expiration: ${JWT_EXPIRATION_MS:86400000}

# MVP: 管理者資格情報（開発用の一時的設定）
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin}

notification:
  mail:
    enabled: ${NOTIFICATION_MAIL_ENABLED:false}
    from: ${NOTIFICATION_MAIL_FROM:no-reply@example.local}
    reply-to: ${NOTIFICATION_MAIL_REPLY_TO:}
    public-base-url: ${PUBLIC_BASE_URL:http://localhost:5173}
