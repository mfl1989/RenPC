# ローカル開発用 PostgreSQL（application.yml の既定ユーザー/DB と一致）
# 起動: docker compose up -d
# 停止: docker compose down
services:
  postgres:
    image: postgres:16-alpine
    container_name: recycle-postgres
    environment:
      POSTGRES_USER: recycle
      POSTGRES_PASSWORD: recycle
      POSTGRES_DB: recycle
    ports:
      - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U recycle -d recycle']
      interval: 5s
      timeout: 5s
      retries: 5
